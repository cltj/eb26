<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placeholder</title>
  <link rel="stylesheet" href="style.css?v=29">
</head>
<body>

  <header class="masthead">
    <div class="container-wide">
      <div class="masthead-inner">
        <div class="site-brand">
          <span class="site-icon-text">Placeholder</span>
          <a href="index.html" class="site-title">Placeholder</a>
        </div>
        <p class="site-tagline">Placeholder subtitle</p>
      </div>
      <nav class="nav">
        <a href="archive.html" class="nav-link">Archive</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </nav>
      <button class="burger-btn" onclick="document.querySelector('.burger-menu').classList.toggle('open')" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="burger-menu">
        <a href="archive.html">Archive</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </header>

  <main class="container-wide">

    <section class="tile-grid">
      <a href="posts/placeholder-story.html" class="tile tile-large">
        <div class="tile-image">
          <img src="images/placeholder-featured.jpg" alt="" onerror="this.parentElement.classList.add('no-image')">
        </div>
        <h2 class="tile-headline">Breaking: Major Developments in EB Operations</h2>
      </a>

      <a href="posts/placeholder-story-2.html" class="tile">
        <div class="tile-image">
          <img src="images/placeholder-thumb-1.jpg" alt="" onerror="this.parentElement.classList.add('no-image')">
        </div>
        <h2 class="tile-headline">Leaked Memo Raises New Questions</h2>
      </a>

      <a href="posts/placeholder-story-3.html" class="tile">
        <div class="tile-image">
          <img src="images/placeholder-thumb-2.jpg" alt="" onerror="this.parentElement.classList.add('no-image')">
        </div>
        <h2 class="tile-headline">Timeline: Key Events So Far</h2>
      </a>

      <a href="posts/placeholder-story-4.html" class="tile">
        <div class="tile-image">
          <img src="images/placeholder-thumb-3.jpg" alt="" onerror="this.parentElement.classList.add('no-image')">
        </div>
        <h2 class="tile-headline">Sources Confirm Additional Parties Involved</h2>
      </a>
    </section>

  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Placeholder. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const masthead = document.querySelector('.masthead');
    window.addEventListener('scroll', () => {
      masthead.classList.toggle('collapsed', window.scrollY > 80);
      const bm = document.querySelector('.burger-menu');
      if (bm) bm.classList.remove('open');
    });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.burger-btn') && !e.target.closest('.burger-menu')) {
        const bm = document.querySelector('.burger-menu');
        if (bm) bm.classList.remove('open');
      }
    });
  </script>

</body>
</html>
