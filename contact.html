<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Placeholder</title>
  <link rel="stylesheet" href="style.css?v=28">
</head>
<body>

  <header class="masthead">
    <div class="container-wide">
      <div class="masthead-inner">
        <div class="site-brand">
          <span class="site-icon-text">Placeholder</span>
          <a href="index.html" class="site-title">Placeholder</a>
        </div>
        <p class="site-tagline">Placeholder subtitle</p>
      </div>
      <nav class="nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="archive.html" class="nav-link">Archive</a>
        <a href="contact.html" class="nav-link active">Contact</a>
      </nav>
      <button class="burger-btn" onclick="document.querySelector('.burger-menu').classList.toggle('open')" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="burger-menu">
        <a href="index.html">Home</a>
        <a href="archive.html">Archive</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </header>

  <main class="container">

    <section class="contact-section">
      <h1 class="contact-title">Contact</h1>
      <p class="contact-description">Have a tip, question, or want to get in touch? Use the form below.</p>

      <form class="contact-form" onsubmit="event.preventDefault(); this.querySelector('.contact-success').style.display='block'; this.reset();">
        <div class="contact-row">
          <input type="text" class="contact-input" name="name" placeholder="Your name" required>
          <input type="email" class="contact-input" name="email" placeholder="Your email" required>
        </div>
        <input type="text" class="contact-input" name="subject" placeholder="Subject">
        <textarea class="contact-textarea" name="message" rows="6" placeholder="Your message..." required></textarea>
        <button type="submit" class="contact-submit">Send Message</button>
        <div class="contact-success" style="display:none;">Thanks for reaching out. We'll get back to you soon.</div>
      </form>
    </section>

  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Placeholder. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const masthead = document.querySelector('.masthead');
    window.addEventListener('scroll', () => {
      masthead.classList.toggle('collapsed', window.scrollY > 80);
      const bm = document.querySelector('.burger-menu');
      if (bm) bm.classList.remove('open');
    });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.burger-btn') && !e.target.closest('.burger-menu')) {
        const bm = document.querySelector('.burger-menu');
        if (bm) bm.classList.remove('open');
      }
    });
  </script>

</body>
</html>
